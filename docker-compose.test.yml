version: '3.8'
services:
  back-test:
    build: .
    ports:
      - "7141:7141"
    environment:
      - DEBUG_API_ERRORS=1
    env_file:
      - .env.test
    depends_on:
      - db-test
    command: /bin/sh -c "uvicorn main:app --host 0.0.0.0 --port 7141 --ws auto"
    volumes:
      - ./uploads:/app/uploads
      - ./contracts:/app/contracts
    networks:
      - test-network

  db-test:
    image: postgres:15
    restart: always
    ports:
      - "5441:5432"
    env_file:
      - .env.test
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_test_data_v2:/var/lib/postgresql/data
    networks:
      - test-network

volumes:
  postgres_test_data_v2:

networks:
  test-network:
    driver: bridge

