version: '3.8'
services:
  back:
    build: .
    ports:
      - "7139:7139"
    environment:
      - DEBUG_API_ERRORS=1
    env_file:
      - .env
    depends_on:
      - db
    command: /bin/sh -c "uvicorn main:app --host 0.0.0.0 --port 7139 --ws auto"
    volumes:
      - ./uploads:/app/uploads  # Монтируем всю директорию uploads
      - ./contracts:/app/contracts  # Монтируем папку contracts
      - ./backups:/app/backups  # Монтируем директорию для backup'ов




  db:
    image: postgres:15
    restart: always
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data_v2:/var/lib/postgresql/data


volumes:
  postgres_data_v2: