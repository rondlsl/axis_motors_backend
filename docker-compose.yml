version: '3.8'
services:
  back:
    build: .
    restart: always
    ports:
      - "7139:7139"
    healthcheck:
      test: [ "CMD", "curl", "-sf", "--max-time", "5", "http://localhost:7139/health" ]
      interval: 15s
      timeout: 5s
      retries: 2
      start_period: 40s
    environment:
      - DEBUG_API_ERRORS=1
    env_file:
      - .env
    depends_on:
      - db
    command: /bin/sh -c "uvicorn main:app --host 0.0.0.0 --port 7139 --ws auto"
    # Все файлы теперь хранятся в MinIO (S3) - volumes не нужны

  db:
    image: postgres:15
    restart: always
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data_v2:/var/lib/postgresql/data

volumes:
  postgres_data_v2:
