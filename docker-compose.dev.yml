version: '3.8'
services:
  back:
    build: .
    ports:
      - "7141:7141"
    environment:
      - DEBUG_API_ERRORS=1
    env_file:
      - .env.dev
    depends_on:
      - db
    command: /bin/sh -c "uvicorn main:app --host 0.0.0.0 --port 7141 --ws auto"
    volumes:
      - ./uploads:/app/uploads
      - ./contracts:/app/contracts

  db:
    image: postgres:15
    restart: always
    ports:
      - "5441:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_dev_data_v2:/var/lib/postgresql/data

volumes:
  postgres_dev_data_v2:

